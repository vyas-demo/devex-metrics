name: Collect DevEx Metrics

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/collect-metrics.yml"
      - "src/**"
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub org or user to collect metrics for"
        required: false
        default: "rajbos"
      owner_type:
        description: "org or user"
        required: false
        default: "user"
      force_refresh:
        description: "Force fresh data collection even if today's fixture already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Get today's date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Restore cached data from today's run (if any).
      # Key includes the date so stale data from previous days is never restored.
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v5
        with:
          path: data
          key: metrics-data-${{ github.repository_owner }}-${{ steps.date.outputs.date }}

      # Agent data is cached separately with a stable restore-key so terminal
      # tasks (completed/failed/cancelled) persist across days without being
      # re-fetched.  The exact key includes the date so updates are saved under
      # a new key each day; the prefix restore-key picks up the most recent
      # prior cache when today's key has no entry yet.
      - name: Restore agent data cache
        uses: actions/cache@v5
        with:
          path: data/agents-*.json
          key: agent-data-${{ github.repository_owner }}-${{ steps.date.outputs.date }}
          restore-keys: |
            agent-data-${{ github.repository_owner }}-

      # Collection is only needed for scheduled runs and manual dispatches.
      # Push-triggered runs rebuild the pages from existing fixture/cache data so
      # that a same-day fixture (collected with older code) is never used to skip
      # a fresh collection that would include new fields like mergedPRDates.
      - name: Generate GitHub App token
        id: app-token
        if: github.event_name != 'push'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Collect metrics
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          # Fine-grained PAT with "Agent tasks" repo permission.
          # GitHub App installation tokens are not supported for this API.
          COPILOT_AGENT_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: |
          OWNER="${{ github.event.inputs.owner || 'rajbos' }}"
          TYPE="${{ github.event.inputs.owner_type || 'user' }}"
          node dist/save-fixture.js "$OWNER" "$TYPE"

      - name: Create PR for updated fixture data
        id: create-pr
        if: github.event_name != 'push'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update ${{ github.event.inputs.owner || 'rajbos' }} fixture data"
          branch: "chore/update-fixture-${{ github.event.inputs.owner || 'rajbos' }}"
          title: "chore: update ${{ github.event.inputs.owner || 'rajbos' }} fixture data"
          body: "Automated fixture data update from the collect-metrics workflow."
          add-paths: "data/*.fixture.json"
          delete-branch: true

      - name: Enable auto-merge on fixture data PR
        if: github.event_name != 'push' && (steps.create-pr.outputs.pull-request-operation == 'created' || steps.create-pr.outputs.pull-request-operation == 'updated')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"

      # actions/cache@v5 automatically saves the data/ folder at job end.

      # Build the GitHub Pages site from the report
      - name: Build pages site
        run: |
          OWNER="${{ github.event.inputs.owner || 'rajbos' }}"
          mkdir -p _site
          node dist/build-pages.js "$OWNER"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
